<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天然水晶好物</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 850px;
            margin: 0 auto;
            padding: 15px;
            background: #f7f7f7;
        }
        h1, h2 {
            text-align: center;
            color: #333;
        }
        .top-info{
            background:#fff;
            padding:20px;
            border-radius:12px;
            margin-bottom:25px;
        }
        .qrcode{
            text-align:center;
            margin-top:15px;
        }
        .qrcode img{
            width:140px;
        }
        .box{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
        }
        .card{
            background:#fff;
            border-radius:12px;
            overflow:hidden;
            padding-bottom:10px;
        }
        .card img,.card video{
            width:100%;
            border-radius:12px 12px 0 0;
        }
        .card p{
            text-align:center;
            margin:8px 0;
            color:#444;
        }
    </style>
</head>
<body>
    <h1>天然水晶好物</h1>
    <div class="top-info">
        <p>天然正品水晶，款式齐全，诚信接单</p >
        <p>咨询微信：Cdj18014414960</p >
        <div class="qrcode">
            < img src="wechat.jpg" alt="微信二维码">
        </div>
    </div>

    <h2>✨ 实拍好物</h2>
    <div class="box">
        <div class="card">
            < img src="1.jpg" alt="巴西紫水晶平安扣">
            <p>巴西紫水晶平安扣</p >
        </div>

        <div class="card">
            <video controls muted>
                <source src="sp1.mp4" type="video/mp4">
            </video>
            <p>水晶实拍展示</p >
        </div>
    </div>
</body>
</html>
